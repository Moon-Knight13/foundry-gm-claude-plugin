name: plugin-ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Content tooling tests
        working-directory: foundry-gm/skills/foundry-content/tooling
        run: |
          npm ci
          node --test

      - name: Validate marketplace + plugin manifests against schemastore
        run: |
          curl -fsSL -o /tmp/marketplace.schema.json https://json.schemastore.org/claude-code-marketplace.json
          curl -fsSL -o /tmp/plugin.schema.json https://json.schemastore.org/claude-code-plugin-manifest.json
          npx --yes -p ajv-cli@5 -p ajv-formats@2 ajv validate --spec=draft7 -c ajv-formats \
            -s /tmp/marketplace.schema.json -d .claude-plugin/marketplace.json
          npx --yes -p ajv-cli@5 -p ajv-formats@2 ajv validate --spec=draft7 -c ajv-formats \
            -s /tmp/plugin.schema.json -d foundry-gm/.claude-plugin/plugin.json

      - name: Shellcheck plugin scripts
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q shellcheck
          shellcheck foundry-gm/hooks/*.sh foundry-gm/skills/foundry-content/tooling/*.sh

      - name: Version consistency (plugin.json == marketplace entry == changelog)
        run: |
          pv=$(node -p "require('./foundry-gm/.claude-plugin/plugin.json').version")
          mv=$(node -p "require('./.claude-plugin/marketplace.json').plugins.find(p=>p.name==='foundry-gm').version")
          test "$pv" = "$mv" || { echo "plugin.json ($pv) != marketplace.json ($mv)"; exit 1; }
          grep -q "^## $pv" foundry-gm/CHANGELOG.md || { echo "CHANGELOG.md missing entry for $pv"; exit 1; }
